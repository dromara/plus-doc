            namespace: 'Docsify-Guide',
        }
    }

<script>
    (function() {
        var layoutTimer;
        var cachedSearchBox;
        var sponsorTimer;
        var versionTimer;
        var versionNavObserver;
        var observedVersionNav;
        var syncingVersionLayout = false;
        var siteConfig = window.PLUS_DOC_SITE_CONFIG || {};
        var sponsorConfig = siteConfig.sponsors || {};
        var sidebarSponsors = sponsorConfig.sidebar || [];
        var homeSponsors = sponsorConfig.home || [];

        function getRoutePath() {
            return (window.location.hash || '#/').replace(/^#/, '') || '/';
        }

        function getVersionPattern() {
            return DOC_VERSIONS.map(function(version) {
                return version.value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }).join('|');
        }

        function stripVersionPrefix(path) {
            var pattern = new RegExp('^/(?:' + getVersionPattern() + ')(?=/|$)');
            return path.replace(pattern, '') || '/';
        }

        function getCurrentVersion() {
            var pattern = new RegExp('^/(' + getVersionPattern() + ')(?=/|$)');
            var matched = getRoutePath().match(pattern);
            return matched ? matched[1] : DEFAULT_DOC_VERSION;
        }

        function switchDocVersion(version) {
            var cleanPath = stripVersionPrefix(getRoutePath());

            if (version === DEFAULT_DOC_VERSION) {
                window.location.hash = cleanPath;
                return;
            }

            window.location.hash = '/' + version + cleanPath;
        }

        function getVersionedHashHref(path) {
            var cleanPath = stripVersionPrefix(path);
            var currentVersion = getCurrentVersion();

            if (currentVersion === DEFAULT_DOC_VERSION) {
                return '#' + cleanPath;
            }

            return '#/' + currentVersion + cleanPath;
        }

        function renderHomeSponsors() {
            var container = document.querySelector('#home-sponsors');
            var sponsorList;
            var contact;
            var contactLink;

            if (!container || !homeSponsors.length) {
                return;
            }

            container.innerHTML = '';
            sponsorList = document.createElement('div');
            sponsorList.className = 'home-sponsors';

            homeSponsors.forEach(function(item) {
                var link = document.createElement('a');
                var image = document.createElement('img');

                link.className = 'home-sponsor';
                link.href = item.href;
                link.target = '_blank';
                link.rel = 'noopener';

                image.src = item.image;
                image.width = 300;
                image.height = 85;
                image.alt = item.period || '';

                link.appendChild(image);
                sponsorList.appendChild(link);
            });

            container.appendChild(sponsorList);

            if (sponsorConfig.contactText && sponsorConfig.contactLink) {
                contact = document.createElement('p');
                contact.className = 'home-sponsor-contact';

                contactLink = document.createElement('a');
                contactLink.href = getVersionedHashHref(sponsorConfig.contactLink);
                contactLink.textContent = sponsorConfig.contactText;

                contact.appendChild(contactLink);
                container.appendChild(contact);
            }
        }

        function syncVersionedLinks() {
            var currentVersion = getCurrentVersion();

            document.querySelectorAll('a[href^="#/"]').forEach(function(link) {
                var hashPath = link.getAttribute('href').replace(/^#/, '') || '/';
                var cleanPath = stripVersionPrefix(hashPath);
                var targetHref;

                if (currentVersion === DEFAULT_DOC_VERSION) {
                    targetHref = '#' + cleanPath;
                    if (link.getAttribute('href') !== targetHref) {
                        link.setAttribute('href', targetHref);
                    }
                    return;
                }

                targetHref = '#/' + currentVersion + cleanPath;
                if (link.getAttribute('href') !== targetHref) {
                    link.setAttribute('href', targetHref);
                }
            });
        }

        function getNavMenuList(nav) {
            for (var i = 0; i < nav.children.length; i++) {
                if (nav.children[i].tagName === 'UL') {
                    return nav.children[i];
                }
            }
            return null;
        }

        function syncNavControlOrder(nav) {
            var sourceList = getNavMenuList(nav);
            var switcher = nav.querySelector('.version-switcher');
            var searchSlot = nav.querySelector('.nav-search-slot');

            if (!sourceList) {
                return;
            }

            if (switcher && searchSlot && switcher.nextElementSibling !== searchSlot) {
                nav.insertBefore(switcher, searchSlot);
            } else if (switcher && !searchSlot && switcher.nextElementSibling !== sourceList) {
                nav.insertBefore(switcher, sourceList);
            }

            if (searchSlot && searchSlot.nextElementSibling !== sourceList) {
                nav.insertBefore(searchSlot, sourceList);
            }
        }

        function renderVersionSwitcher() {
            var nav = document.querySelector('nav.app-nav');
            var sourceList;
            var switcher;

            if (!nav) {
                return;
            }

            switcher = nav.querySelector('.version-switcher');
            if (!switcher) {
                switcher = document.createElement('select');
                switcher.className = 'version-switcher';
                switcher.setAttribute('aria-label', '文档版本切换');

                DOC_VERSIONS.forEach(function(version) {
                    var option = document.createElement('option');
                    option.textContent = version.label;
                    option.value = version.value;
                    switcher.appendChild(option);
                });

                switcher.addEventListener('change', function() {
                    switchDocVersion(switcher.value);
                });

                sourceList = getNavMenuList(nav);

                nav.insertBefore(switcher, sourceList || nav.firstChild);
            }

            switcher.value = getCurrentVersion();
            syncNavControlOrder(nav);
        }

        function syncVersionLayout() {
            syncingVersionLayout = true;
            renderVersionSwitcher();
            syncVersionedLinks();
            syncingVersionLayout = false;
        }

        function scheduleVersionLayout() {
            window.clearTimeout(versionTimer);
            versionTimer = window.setTimeout(syncVersionLayout, 0);
            window.setTimeout(syncVersionLayout, 80);
            window.setTimeout(syncVersionLayout, 240);
        }

        function observeVersionNav() {
            var nav = document.querySelector('nav.app-nav');

            if (!nav || !window.MutationObserver || observedVersionNav === nav) {
                return;
            }

            if (versionNavObserver) {
                versionNavObserver.disconnect();
            }

            observedVersionNav = nav;
            versionNavObserver = new MutationObserver(function() {
                if (!syncingVersionLayout) {
                    scheduleVersionLayout();
                }
            });
            versionNavObserver.observe(nav, {
                childList: true,
                subtree: true
            });
        }

        function scheduleVersionNav() {
            observeVersionNav();
            scheduleVersionLayout();
        }

        function restoreSidebarSearch(searchBox, aside) {
            if (!searchBox || !aside || !aside.parentNode) {
                return;
            }

            if (searchBox.parentNode !== aside.parentNode || searchBox.nextElementSibling !== aside) {
                aside.parentNode.insertBefore(searchBox, aside);
            }
        }

        function placeSearchInNavbar() {
            var searchBox = document.querySelector('div.search') || cachedSearchBox;
            var aside = document.querySelector('aside.sidebar');
            var nav = document.querySelector('nav.app-nav');
            var sourceList;

            if (!searchBox || !aside) {
                return;
            }
            cachedSearchBox = searchBox;

            if (!nav || window.innerWidth <= 768) {
                restoreSidebarSearch(searchBox, aside);
                return;
            }

            var existingSlot = nav.querySelector('.nav-search-slot');
            if (existingSlot) {
                nav.classList.add('app-nav--with-search');
                if (searchBox.parentNode !== existingSlot) {
                    existingSlot.appendChild(searchBox);
                }
                syncNavControlOrder(nav);
                return;
            }

            sourceList = getNavMenuList(nav);
            if (!sourceList) {
                return;
            }

            var searchSlot = document.createElement('div');
            searchSlot.className = 'nav-search-slot';
            searchSlot.appendChild(searchBox);
            nav.insertBefore(searchSlot, sourceList);
            nav.classList.add('app-nav--with-search');
            syncNavControlOrder(nav);
        }

        function scheduleSearchLayout() {
            window.clearTimeout(layoutTimer);
            layoutTimer = window.setTimeout(placeSearchInNavbar, 0);
        }

        function shuffle(items) {
            for (var i = items.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = items[i];
                items[i] = items[j];
                items[j] = temp;
            }
            return items;
        }

        function renderSidebarSponsors() {
            var sidebarNav = document.querySelector('.sidebar .sidebar-nav');
            var existingSection;
            var firstChild;
            var section;
            var title;
            var sponsorList;
            var note;

            if (!sidebarNav || !sidebarSponsors.length) {
                return;
            }

            existingSection = sidebarNav.querySelector('.sidebar-sponsor-section');
            if (existingSection) {
                existingSection.parentNode.removeChild(existingSection);
            }

            firstChild = sidebarNav.firstElementChild;
            if (!firstChild) {
                return;
            }

            section = document.createElement('div');
            section.className = 'sidebar-sponsor-section';

            title = document.createElement('div');
            title.className = 'sidebar-sponsor-title';
            title.textContent = '满三年大力赞助';

            sponsorList = document.createElement('div');
            sponsorList.className = 'sidebar-sponsors';

            shuffle(sidebarSponsors.slice()).slice(0, 3).forEach(function(item) {
                var link = document.createElement('a');
                var image = document.createElement('img');

                link.className = 'sidebar-sponsor';
                link.href = item.href;

                image.src = item.image;
                image.width = 260;
                image.height = 70;

                link.appendChild(image);
                sponsorList.appendChild(link);
            });

            section.appendChild(title);
            section.appendChild(sponsorList);

            note = document.createElement('div');
            note.className = 'sidebar-sponsor-note';
            note.textContent = '以上广告位随机展示 3 个';
            section.appendChild(note);

            sidebarNav.insertBefore(section, firstChild);
        }

        function scheduleSidebarSponsors() {
            window.clearTimeout(sponsorTimer);
            sponsorTimer = window.setTimeout(renderSidebarSponsors, 0);
        }

        function scheduleHomeSponsors() {
            window.setTimeout(renderHomeSponsors, 0);
            window.setTimeout(renderHomeSponsors, 120);
        }

        window.addEventListener('resize', scheduleSearchLayout);
        window.addEventListener('hashchange', scheduleVersionNav);
        window.$docsify.plugins = [].concat(window.$docsify.plugins || [], function(hook) {
            hook.mounted(scheduleVersionNav);
            hook.mounted(scheduleSearchLayout);
            hook.mounted(scheduleSidebarSponsors);
            hook.mounted(scheduleHomeSponsors);
            hook.doneEach(scheduleVersionNav);
            hook.doneEach(scheduleSearchLayout);
            hook.doneEach(scheduleSidebarSponsors);
            hook.doneEach(scheduleHomeSponsors);
            hook.ready(scheduleVersionNav);
            hook.ready(scheduleSearchLayout);
            hook.ready(scheduleSidebarSponsors);
            hook.ready(scheduleHomeSponsors);
        });
    })();
</script>
